# Consumer CI — pull the contract fresh and prove conformance.
#
# Copy to .github/workflows/ci-with-contracts.yml in YOUR (consumer) repo.
#
# IMPORTANT: trigger on pull_request, NOT pull_request_target. The conformance
# gate checks your PR-HEAD code against the contract you have PINNED. On
# pull_request the default checkout is PR-head and the default token is read-only.
#
# Pin @v1.0.0 (immutable). Bump the pin deliberately when you adopt a new contract.
name: CI (contracts)

on:
  pull_request:

permissions:
  contents: read

jobs:
  # Prove this PR's code honors the contract you've adopted. Advisory first:
  # it WARNS until you flip enforcement_mode to gate. Earn the gate.
  contract-conformance:
    uses: Starisian-Technologies/sparxstar-contracts-registry/.github/workflows/contract-conformance.yml@v1.0.0
    with:
      contract-ref: v1.0.0          # the contract version you have adopted
      # contracts: "iamc/helios"    # optional: restrict to specific contract ids
      enforcement_mode: advisory    # advisory | gate  (flip to gate once clean)
    secrets:
      COMPOSER_RESOLVER_PRIVATE_KEY: ${{ secrets.COMPOSER_RESOLVER_PRIVATE_KEY }}

  # Optional: pull the contract as an artifact for your build/codegen. You never
  # commit it — see .gitignore-additions. Re-pull every run; never hold a stale copy.
  fetch-contract:
    uses: Starisian-Technologies/sparxstar-contracts-registry/.github/workflows/fetch-contracts.yml@v1.0.0
    with:
      contract-ref: v1.0.0
      # report-drift: true          # optional: record your version tier in the registry
    secrets:
      COMPOSER_RESOLVER_PRIVATE_KEY: ${{ secrets.COMPOSER_RESOLVER_PRIVATE_KEY }}
