name: Live-Tag Acceptance Test

# Mirror of the governance registry's live-tag-acceptance-test.yml.
# Proves that contract-conformance.yml reads the PINNED ref's contract (not main's).
#
# Calls the conformance gate at a marker ref and in advisory mode. The marker ref
# should carry a contract shape that differs from main; if the gate's output reflects
# the marker (not main), the pinned-ref checkout + v3-bug guard are working.
#
# Note: GitHub rejects tag pushes containing workflow files without the 'workflows'
# permission scope, so a branch ref tests the same code path as a tag.

on:
  workflow_dispatch:

# contents: read (not empty) so the called conformance workflow can check out
# PR-head; the caller's permissions cap the callee's.
permissions:
  contents: read

jobs:
  acceptance-test:
    uses: Starisian-Technologies/sparxstar-contracts-registry/.github/workflows/contract-conformance.yml@test/live-tag-marker
    with:
      enforcement_mode: advisory
      contract-ref: test/live-tag-marker
    secrets:
      COMPOSER_RESOLVER_PRIVATE_KEY: ${{ secrets.COMPOSER_RESOLVER_PRIVATE_KEY }}
