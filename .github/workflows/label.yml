# This workflow will triage pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# To use this workflow, you will need to set up a .github/labeler.yml
# file with configuration.  For more information, see:
# https://github.com/actions/labeler

name: Labeler
# pull_request (not pull_request_target): runs from the PR head, reads the config
# from this repo, and avoids granting write to untrusted PR code. Requires
# .github/labeler.yml (added). NOTE: this fix takes effect for PRs opened AFTER it
# lands on main — a pull_request_target check already on main runs main's old version.
on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v4
      # Don't fail the check if a target label doesn't exist yet — labeling is advisory.
      continue-on-error: true
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
