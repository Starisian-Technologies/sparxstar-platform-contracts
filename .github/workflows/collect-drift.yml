name: Collect Drift Reports

# Registry-side aggregator. Consumers write their version state to drift/<repo>.json
# (via fetch-contracts.yml's opt-in report-drift). This workflow rebuilds
# drift/INDEX.md so every consumer's contract-ref tier is visible in one place.
#
# Runs only in the registry, writing to the registry with the default GITHUB_TOKEN —
# no cross-repo access, no app token needed.

on:
  push:
    branches: [main]
    paths:
      - "drift/*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-drift
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rebuild drift/INDEX.md
        run: |
          python3 - <<'PYEOF'
          import glob, json, os

          rows = []
          for path in sorted(glob.glob("drift/*.json")):
              try:
                  d = json.load(open(path))
              except Exception:
                  continue
              rows.append(d)

          lines = ["# Consumer version-drift index", "",
                   "Auto-generated by `collect-drift.yml`. One row per consumer repo that",
                   "opted into `report-drift`. Do not edit by hand.", "",
                   "| Consumer | Contract ref | Resolved | Recommended | Tier | Gate |",
                   "|---|---|---|---|---|---|"]
          for d in rows:
              lines.append(f"| `{d.get('caller_repo','?')}` "
                           f"| `{d.get('contract_ref') or '—'}` "
                           f"| `{d.get('resolved') or '—'}` "
                           f"| `{d.get('recommended') or '—'}` "
                           f"| {d.get('tier','?')} "
                           f"| {d.get('gate','?')} |")
          if not rows:
              lines.append("| _(no reports yet)_ | — | — | — | — | — |")

          os.makedirs("drift", exist_ok=True)
          with open("drift/INDEX.md", "w") as f:
              f.write("\n".join(lines) + "\n")
          print(f"Indexed {len(rows)} consumer report(s).")
          PYEOF

      - name: Commit index if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drift/INDEX.md
          if git diff --cached --quiet; then
            echo "No change to drift/INDEX.md."
          else
            git commit -m "drift: rebuild consumer version-drift index"
            git push
          fi
