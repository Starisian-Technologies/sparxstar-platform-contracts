# contract-conformance.yml — the consumer's code checked against the contract.
#
# Enforcement gate shaped like the ADR gate (two-job privileged/unprivileged split),
# NOT like fetch. It answers: "does the consumer's code, as proposed in THIS PR,
# honor the contract the consumer has pinned?"
#
# TWO AXES OF "old vs new" — both handled deliberately:
#   Axis 1 (contract version): check against the PINNED contract-ref, never the
#           contract registry's main. Main moving ahead of the pin is the expected,
#           advisory, not-a-failure state.
#   Axis 2 (consumer code): check the consumer's PR-HEAD, never the consumer's main.
#           The PR is where the consumer updates toward conformance; checking main
#           would flag the very changes the PR is fixing and the PR could never go green.
#   => This run pairs: pinned contract (axis 1) vs PR-head code (axis 2).
#
# SECURITY (the reason for the split): PR-head code is untrusted (anyone can open a
# PR). The privileged job mints the App token and fetches the pinned contract and
# NEVER checks out PR-head. The unprivileged job checks out PR-head, downloads the
# trusted contract artifact, and runs the assertions with NO App token. The
# assertions READ PR-head as data (PHP tokeniser, no include/exec); they never run it.
# The assertion script itself comes from the trusted artifact, not from PR-head.
#
# Advisory-first / earn-gate: enforcement_mode defaults to 'advisory' (warn, never
# block). Flip to 'gate' only once a consumer is clean and wants to stay clean.
#
# Callers MUST invoke this on `pull_request` (NOT pull_request_target), so the
# default checkout is PR-head and the default GITHUB_TOKEN is read-only.
#
# Reconciled against the live governance adr-enforce.yml this session: the two-job
# split, the composer-resolver READ token, and GITHUB_WORKFLOW_REF ref-resolution
# match the proven ADR gate. (Difference by design: enforcement_mode defaults to
# 'advisory' here per the contracts task, where the ADR gate defaults to 'gate'.)
name: contract-conformance

on:
  workflow_call:
    inputs:
      contract-ref:
        description: >
          Pinned registry ref the consumer has adopted (e.g. v1.0.0). Checked, not main.
          If omitted, it is derived from the @<ref> on the uses: line (GITHUB_WORKFLOW_REF).
          Explicit always wins — set it if you care which contract version runs.
        type: string
        required: false
        default: ""
      contracts:
        description: "Space/comma list of MANIFEST contract ids to check. Empty = all the consumer is party to."
        type: string
        required: false
        default: ""
      consumer:
        description: "owner/repo of the consumer. Defaults to the caller. Selects which contracts bind."
        type: string
        required: false
        default: ""
      consumer-path:
        description: "Subdirectory of the consumer's PR-head code to check (default: whole repo)."
        type: string
        required: false
        default: "."
      enforcement_mode:
        description: "advisory (default, warn only) or gate (block on failure). Earn the gate."
        type: string
        required: false
        default: "advisory"
    secrets:
      COMPOSER_RESOLVER_PRIVATE_KEY:
        description: "Private key for the composer-resolver READ App. Required."
        required: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # PRIVILEGED — mints the read token, fetches the PINNED contract, ships the
  # trusted assertion script. NEVER checks out PR-head code.
  # ----------------------------------------------------------------------------
  fetch-contract:
    runs-on: ubuntu-latest
    steps:
      # Resolve the contract ref the same way the proven ADR gate does: explicit
      # input wins; otherwise parse the @<ref> the reusable workflow was called at
      # from GITHUB_WORKFLOW_REF (github.action_ref is unreliable for reusable workflows).
      - name: Resolve pinned ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.contract-ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            RESOLVED="$INPUT_REF"; SOURCE="explicit-input"
          else
            RESOLVED="${GITHUB_WORKFLOW_REF##*@}"; SOURCE="GITHUB_WORKFLOW_REF"
          fi
          RESOLVED="${RESOLVED#refs/tags/}"
          RESOLVED="${RESOLVED#refs/heads/}"
          if [ -z "$RESOLVED" ]; then
            echo "::error::Could not determine contract ref. Set contract-ref explicitly."; exit 1
          fi
          echo "ref=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "Resolved contract ref: $RESOLVED (source: $SOURCE)"

      - name: Mint composer-resolver READ token
        id: read-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.COMPOSER_RESOLVER_CLIENT_ID }}
          private-key: ${{ secrets.COMPOSER_RESOLVER_PRIVATE_KEY }}
          owner: Starisian-Technologies
          repositories: sparxstar-contracts-registry

      - name: Checkout registry at pinned contract-ref
        uses: actions/checkout@v7
        with:
          repository: Starisian-Technologies/sparxstar-contracts-registry
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ steps.read-token.outputs.token }}
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true
          path: registry

      - name: Fetch pinned contract + stage trusted assertion script
        env:
          CONTRACT_REF: ${{ steps.ref.outputs.ref }}
          REQUESTED_CONTRACTS: ${{ inputs.contracts }}
          CONSUMER: ${{ inputs.consumer != '' && inputs.consumer || github.repository }}
          OUT_DIR: ${{ github.workspace }}/artifact/contracts
        run: |
          set -euo pipefail
          bash registry/scripts/fetch-contracts.sh
          # Ship the assertion script OUTSIDE the contracts dir so it is not parsed
          # as a contract, and so the unprivileged job runs the TRUSTED (registry)
          # copy rather than anything from PR-head. Use the runner-provided
          # GITHUB_WORKSPACE env var rather than a workflow expression in the script.
          cp registry/scripts/contract-conformance.php "${GITHUB_WORKSPACE}/artifact/contract-conformance.php"

      - name: Upload contract artifact (contracts + trusted assertion script)
        uses: actions/upload-artifact@v7
        with:
          name: contract-conformance-bundle
          path: ${{ github.workspace }}/artifact
          retention-days: 1
          if-no-files-found: error

  # ----------------------------------------------------------------------------
  # UNPRIVILEGED — checks out PR-head (untrusted, read as DATA only), downloads the
  # trusted bundle, runs the assertions. NO App token.
  # ----------------------------------------------------------------------------
  conformance:
    runs-on: ubuntu-latest
    needs: fetch-contract
    permissions:
      contents: read
    steps:
      # Checking out PR-head is the POINT of a conformance gate — and it is safe here
      # by construction: this job holds NO App token and NO write permission
      # (contents: read), persists no credentials, and only READS the code as data.
      # CodeQL flags the pattern generically; the two-job split is the accepted
      # mitigation. Callers MUST trigger on pull_request (not pull_request_target).
      - name: Checkout consumer PR-head (untrusted — data only)
        uses: actions/checkout@v7
        with:
          path: consumer
          persist-credentials: false

      - name: Download trusted contract bundle
        uses: actions/download-artifact@v7
        with:
          name: contract-conformance-bundle
          path: bundle

      # PHP is preinstalled on ubuntu runners; no 3rd-party setup action needed.
      # The script only needs token_get_all (PHP 7+); it never executes PR-head.
      - name: Run contract conformance assertions
        env:
          MODE: ${{ inputs.enforcement_mode }}
          CONSUMER_PATH: ${{ inputs.consumer-path }}
        run: |
          set -euo pipefail
          target="consumer"
          if [[ "$CONSUMER_PATH" != "." && -n "$CONSUMER_PATH" ]]; then
            target="consumer/${CONSUMER_PATH}"
          fi
          # The assertion script (trusted, from the bundle) only tokenises the
          # consumer code as data — it never includes or executes PR-head.
          php bundle/contract-conformance.php \
            --contracts "bundle/contracts" \
            --consumer "$target" \
            --mode "$MODE"
